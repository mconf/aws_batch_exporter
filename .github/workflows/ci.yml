name: Continuous Integration

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    uses: mconf/mconf-ci-jobs/.github/workflows/lb-go-lint.yml@main
    secrets: inherit
    with:
      go-version: "1.21"
      golangci-lint-version: "v2.5.0"

  test:
    uses: mconf/mconf-ci-jobs/.github/workflows/lb-go-tests.yml@main
    secrets: inherit
    with:
      go-version: "1.21"
    needs:
      - lint

  push-scan:
    uses: mconf/mconf-ci-jobs/.github/workflows/lb-push-scan-image.yml@main
    secrets: inherit
    needs:
      - test
